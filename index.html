<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flofentry Foods | Premium Nuts Kenya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f0f0f;color:#fff;}

header{display:flex;justify-content:space-between;padding:15px;background:#000;}
.logo img{height:40px;}

.slider{height:350px;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.slide{display:none;text-align:center;}
.slide.active{display:block;}
.slide img{max-width:220px;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card{background:#1a1a1a;padding:15px;border-radius:10px;text-align:center;}
.card img{width:100%;height:160px;object-fit:cover;}

.btn{background:#25D366;border:none;padding:10px;color:#fff;width:100%;cursor:pointer;margin-top:10px;}

.review{background:#1a1a1a;padding:15px;margin:10px;border-radius:10px;}
.badge{background:#25D366;padding:3px 8px;font-size:12px;border-radius:5px;}

#stars span{font-size:25px;cursor:pointer;color:#555;}
#stars .active{color:gold;}

</style>
</head>

<body>

<header>
<h2>Flofentry</h2>
<div>Cart: <span id="cart-count">0</span></div>
</header>

<!-- SLIDER -->
<div id="slider"></div>

<!-- AVG RATING -->
<div id="rating-summary" style="text-align:center;margin:20px;">
<h2>Customer Satisfaction</h2>
<div id="avg-rating">★★★★★</div>
<p id="rating-count"></p>
</div>

<!-- PRODUCTS -->
<div class="products" id="products-list"></div>

<!-- CART -->
<div style="max-width:500px;margin:auto;">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<button onclick="getLocation()">Detect Location</button>

<div id="cart-items"></div>
<div>Total: <span id="total">0</span></div>
<button onclick="checkout()">Order</button>
</div>

<!-- FEEDBACK -->
<h2 style="text-align:center;">Reviews</h2>

<select id="filter-product" onchange="filterReviews()"></select>

<input id="fb-name" placeholder="Name">
<input id="fb-phone" placeholder="Phone">

<select id="fb-product"></select>

<div id="stars">
<span onclick="setRating(1)">★</span>
<span onclick="setRating(2)">★</span>
<span onclick="setRating(3)">★</span>
<span onclick="setRating(4)">★</span>
<span onclick="setRating(5)">★</span>
</div>

<textarea id="fb-message"></textarea>
<input type="file" id="fb-image">

<button onclick="submitFeedback()">Submit</button>

<div id="feedback-list"></div>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"YOUR_PROJECT_ID"
});
const db=firebase.firestore();

/* PRODUCTS */
let products=[
{name:"Bitter Kola 60g",price:600,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g",price:1200,img:"images/bitterkola-125g.jpg"},
{name:"Almond 1kg",price:2000,img:"images/almond-1kg.jpg"},
{name:"Almond 500g",price:1200,img:"images/almond-500g.jpg"},
{name:"Almond 250g",price:700,img:"images/almond-250g.jpg"},
{name:"Cashew 1kg",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Cashew 500g",price:1000,img:"images/cashew-500g.jpg"},
{name:"Cashew 250g",price:600,img:"images/cashew-250g.jpg"},
{name:"Brazil Nuts 500g",price:3500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g",price:2000,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g",price:1200,img:"images/brazil-125g.jpg"}
];

let cart=[];

/* RENDER PRODUCTS */
function render(){
products-list.innerHTML="";
products.forEach(p=>{
products-list.innerHTML+=`
<div class="card">
<img src="${p.img}" onerror="this.src='images/logo.jpg'">
<h3>${p.name}</h3>
<div id="rating-${p.name}">Loading...</div>
<p>KSh ${p.price}</p>
<button onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

/* SLIDER */
let i=0;
function buildSlider(){
slider.innerHTML=products.map((p,index)=>`
<div class="slide ${index===0?"active":""}">
<img src="${p.img}">
<h3>${p.name}</h3>
</div>`).join("");
}
setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}
function updateCart(){
let t=0;
cart-items.innerHTML="";
cart.forEach(i=>{t+=i.price;cart-items.innerHTML+=i.name+"<br>";});
total.innerText=t;
cart-count.innerText=cart.length;
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
location.value=pos.coords.latitude+","+pos.coords.longitude;
});
}

/* CHECKOUT */
function checkout(){
window.open("https://wa.me/254726718968");
}

/* REVIEWS */
let rating=0;
function setRating(r){rating=r;}

async function submitFeedback(){

let name=fb-name.value;
let phone=fb-phone.value;
let product=fb-product.value;
let message=fb-message.value;
let file=fb-image.files[0];

if(!name||!phone||!product||!message||rating===0) return;

let spam=["http","www"];
if(spam.some(w=>message.includes(w))) return alert("Spam");

let verified=false;
let orders=await db.collection("orders").where("customer.phone","==",phone).get();
if(!orders.empty) verified=true;

let image="";
if(file){
let reader=new FileReader();
reader.onload=()=>save(reader.result);
reader.readAsDataURL(file);
}else save("");

function save(img){
db.collection("feedback").add({
name,phone,product,message,
rating,likes:0,verified,image:img,date:new Date().toISOString()
});
}

}

/* LOAD REVIEWS */
function loadFeedback(){
db.collection("feedback").onSnapshot(snap=>{

let totalR=0,count=0;
let ratings={};
feedback-list.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

if(!ratings[d.product]) ratings[d.product]={t:0,c:0};
ratings[d.product].t+=d.rating;
ratings[d.product].c++;

totalR+=d.rating;count++;

feedback-list.innerHTML+=`
<div class="review" data-product="${d.product}">
<b>${d.name}</b> ${d.verified?'<span class="badge">Verified</span>':''}<br>
${"★".repeat(d.rating)}<br>
<i>${d.product}</i>
<p>${d.message}</p>
${d.image?`<img src="${d.image}" width="100">`:''}
<div onclick="like('${doc.id}')">👍 ${d.likes}</div>
<button onclick="del('${doc.id}')">Delete</button>
</div>`;
});

/* AVG */
let avg=(totalR/count||0).toFixed(1);
avg-rating.innerText="★".repeat(Math.round(avg));
rating-count.innerText=`${avg}/5 (${count})`;

/* PER PRODUCT */
products.forEach(p=>{
let el=document.getElementById(`rating-${p.name}`);
if(ratings[p.name]){
let a=(ratings[p.name].t/ratings[p.name].c).toFixed(1);
el.innerText="★".repeat(Math.round(a));
}else el.innerText="No reviews";
});

});
}

/* FILTER */
function filterReviews(){
let val=filter-product.value;
document.querySelectorAll(".review").forEach(r=>{
r.style.display=(val==="all"||r.dataset.product===val)?"block":"none";
});
}

/* LIKE */
function like(id){
db.collection("feedback").doc(id).update({
likes:firebase.firestore.FieldValue.increment(1)
});
}

/* DELETE */
function del(id){
if(prompt("Admin password")!=="Newtonohms@1")return;
db.collection("feedback").doc(id).delete();
}

/* INIT */
products.forEach(p=>{
fb-product.innerHTML+=`<option>${p.name}</option>`;
filter-product.innerHTML+=`<option>${p.name}</option>`;
});
filter-product.innerHTML='<option value="all">All</option>'+filter-product.innerHTML;

render();
buildSlider();
loadFeedback();

</script>

</body>
</html>
