<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flofentry Foods | Buy Nuts in Kenya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1a14;
--card:#16241c;
--primary:#2e7d32;
--accent:#d4af37;
--text:#f5f5f5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(135deg,#0f1a14,#121f18);
color:var(--text);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#000;
position:sticky;
top:0;
z-index:1000;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:8px;
}

.logo img{height:35px;}

.logo h2{font-size:18px;}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

nav a{
margin:5px 8px;
color:#fff;
text-decoration:none;
font-size:13px;
}

/* SLIDER */
.slider{
height:200px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
background-size:cover;
background-position:center;
}

.slide.active{opacity:1;}

/* SECTION */
section{
padding:30px 15px;
max-width:1200px;
margin:auto;
}

h2{
text-align:center;
color:var(--accent);
margin-bottom:15px;
font-size:20px;
}

/* GRID */
.trust,.steps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.box{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
font-size:14px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:var(--card);
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

.card h4{font-size:14px;margin:5px 0;}
.card p{font-size:13px;}

.btn{
background:var(--primary);
padding:8px;
border:none;
width:100%;
margin-top:6px;
border-radius:6px;
color:#fff;
cursor:pointer;
}

/* CART */
#cartDrawer{
position:fixed;
right:-100%;
top:0;
width:100%;
max-width:350px;
height:100%;
background:#111;
padding:70px 15px;
transition:0.3s;
z-index:2000;
}

#cartDrawer.active{right:0;}

input{
width:100%;
padding:8px;
margin-top:8px;
border-radius:6px;
border:none;
}

/* MOBILE */
@media(min-width:768px){
.products{grid-template-columns:repeat(4,1fr);}
.slider{height:300px;}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="images/logo.jpg">
<h2>Flofentry</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#about">About</a>
</nav>

<div onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</header>

<!-- SLIDER -->
<div id="slider" class="slider"></div>

<!-- TRUST -->
<section>
<h2>Why Choose Us</h2>
<div class="trust">
<div class="box">Premium quality nuts</div>
<div class="box">Fast delivery in Kenya</div>
<div class="box">Secure ordering</div>
</div>
</section>

<!-- PRODUCTS -->
<section id="products">
<h2>Products</h2>
<input placeholder="Search products..." oninput="search(this.value)">
<div id="products-list" class="products"></div>
</section>

<!-- ABOUT -->
<section id="about">
<h2>About</h2>
<p style="text-align:center;">We supply premium nuts across Kenya.</p>
</section>

<!-- CART -->
<div id="cartDrawer">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<h3>Total: KSh <span id="total">0</span></h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button class="btn" onclick="checkout()">Order via WhatsApp</button>
<button class="btn" onclick="closeCart()">Close</button>
</div>

<!-- FOOTER -->
<footer style="text-align:center;padding:15px;background:#000;">
<p>© Flofentry Foods</p>
<p>📞 0726718968</p>
</footer>

<script>

/* PRODUCTS */
let products=[ {name:"Bitter Kola 60g – Natural Herbal Wellness",price:1000,img:"images/bitterkola-60g.jpg"}, {name:"Bitter Kola 125g – Premium Herbal Kola Nuts",price:2000,img:"images/bitterkola-125g.jpg"}, {name:"Raw Almonds 1kg – Premium Healthy Nuts",price:2200,img:"images/almond-1kg.jpg"}, {name:"Roasted Almonds 1kg – Crunchy Snack Pack",price:2400,img:"images/almond-1kg.jpg"}, {name:"Raw Almonds 500g – Fresh Natural Nuts",price:1200,img:"images/almond-500g.jpg"}, {name:"Roasted Almonds 500g – Crunchy & Tasty",price:1400,img:"images/almond-500g.jpg"}, {name:"Raw Almonds 250g – Healthy Snack Pack",price:700,img:"images/almond-250g.jpg"}, {name:"Roasted Almonds 250g – Ready-to-Eat Crunchy Nuts",price:900,img:"images/almond-250g.jpg"}, {name:"Raw Cashew Nuts 1kg – Premium Fresh Quality",price:1800,img:"images/cashew-1kg.jpg"}, {name:"Roasted Cashew Nuts 1kg – Crunchy Snack Pack",price:2000,img:"images/cashew-1kg.jpg"}, {name:"Raw Cashew Nuts 500g – Fresh Natural Snack",price:1000,img:"images/cashew-500g.jpg"}, {name:"Roasted Cashew Nuts 500g – Crunchy & Tasty",price:1200,img:"images/cashew-500g.jpg"}, {name:"Raw Cashew Nuts 250g – Healthy Snack Pack",price:600,img:"images/cashew-250g.jpg"}, {name:"Roasted Cashew Nuts 250g – Ready-to-Eat Snack",price:800,img:"images/cashew-250g.jpg"}, {name:"Brazil Nuts 500g",price:5500,img:"images/brazil-500g.jpg"}, {name:"Brazil Nuts 250g",price:3500,img:"images/brazil-250g.jpg"}, {name:"Brazil Nuts 125g",price:1800,img:"images/brazil-125g.jpg"} ];

/* CART */
let cart=[];

function add(name){
let item=cart.find(p=>p.name===name);
if(item){item.qty++;}
else{
let p=products.find(p=>p.name===name);
cart.push({...p,qty:1});
}
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
box.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price*i.qty;
box.innerHTML+=`
<div>
${i.name} x${i.qty} - KSh ${i.price*i.qty}
<button onclick="removeItem(${index})">X</button>
</div>`;
});

document.getElementById("total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function toggleCart(){
document.getElementById("cartDrawer").classList.add("active");
}

function closeCart(){
document.getElementById("cartDrawer").classList.remove("active");
}

/* SEARCH */
function render(list=products){
let box=document.getElementById("products-list");
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>KSh ${p.price}</p>
<button class="btn" onclick="add('${p.name}')">Add</button>
</div>`;
});
}

function search(q){
render(products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

/* SLIDER */
let index=0;
function buildSlider(){
let s=document.getElementById("slider");

products.forEach((p,i)=>{
s.innerHTML+=`<div class="slide ${i==0?"active":""}" style="background-image:url('${p.img}')"></div>`;
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(x=>x.classList.remove("active"));
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);
}

/* CHECKOUT */
function checkout(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(!name || !phone){
alert("Enter details");
return;
}

let msg="Order:%0A";
cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});

window.open("https://wa.me/254726718968?text="+msg);
}

/* INIT */
render();
buildSlider();

</script>

</body>
</html>
