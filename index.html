<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flofentry Foods | Premium Nuts Kenya</title>

<meta name="description" content="Buy fresh almonds, cashews, bitter kola and Brazil nuts in Kenya. Premium healthy snacks delivered in Nairobi.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root{
--bg:#0f1a14;
--card:#16241c;
--primary:#2e7d32;
--accent:#d4af37;
--text:#f5f5f5;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:linear-gradient(135deg,#0f1a14,#121f18);
color:var(--text);
}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 25px;
background:rgba(0,0,0,0.6);
position:sticky;top:0;z-index:1000;
flex-wrap:wrap;gap:10px;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.logo h2{color:var(--accent);}

nav a{
margin-left:15px;
text-decoration:none;
color:#fff;
font-size:14px;
}

#search{
padding:8px;border-radius:6px;border:none;width:160px;
}

/* HERO */
.hero{padding:20px;}
.slider{height:380px;border-radius:12px;overflow:hidden;position:relative;}

.slide{
position:absolute;width:100%;height:100%;
opacity:0;transition:1s;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background-size:contain;background-repeat:no-repeat;background-position:center;
padding:20px;
}

.slide::before{
content:"";position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.slide.active{opacity:1;}

.slide h1{
z-index:2;
font-size:clamp(18px,3.5vw,32px);
text-align:center;
}

/* PRODUCTS */
section{padding:60px 20px;max-width:1200px;margin:auto;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
}

.card img{
width:100%;height:160px;object-fit:contain;
background:#0d1511;border-radius:8px;
}

.btn{
background:var(--primary);
padding:10px;
border:none;width:100%;
border-radius:6px;color:#fff;
margin-top:8px;
}

/* CART */
#cart-box{
max-width:500px;margin:40px auto;
background:var(--card);
padding:20px;border-radius:10px;
}

input{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:6px;
}

/* CONFIRMATION */
#confirmation{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#0f1a14;
z-index:9999;
padding:20px;
text-align:center;
}

/* FOOTER */
footer{
background:#000;padding:20px;text-align:center;margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="images/logo.jpg">
<h2>Flofentry</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
</nav>

<input id="search" placeholder="Search...">

<div>Cart: <span id="cart-count">0</span></div>
</header>

<section class="hero">
<div id="slider" class="slider"></div>
</section>

<section id="products">
<h2>Our Products</h2>
<div id="products-list" class="products"></div>
</section>

<div id="cart-box">
<h3>Checkout</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Location">
<button class="btn" onclick="getLocation()">
Auto Detect Location
</button> 

<div id="cart-items"></div>
<h3>Total: KSh <span id="total">0</span></h3>
<p style="font-size:13px;color:#bbb;margin-top:10px;">
🚚 We deliver across Kenya at a small fee depending on your location.
</p>
<button class="btn" onclick="checkout()">Order via WhatsApp</button>
</div>

<!-- CONFIRMATION -->
<div id="confirmation">
<h2>✅ Order Placed Successfully</h2>
<div id="order-summary"></div>
<button class="btn" onclick="closeConfirmation()">Continue Shopping</button>
</div>

<footer>
<p>© 2026 Flofentry Foods</p>
<p>📞 +254726718968 | 📧 flofentryfoods@gmail.com</p>
</footer>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"YOUR_PROJECT_ID"
});
const db=firebase.firestore();

/* PRODUCTS (PRO TITLES) */
let products=[

// BITTER KOLA
{name:"Bitter Kola 60g – Natural Herbal Wellness",price:1000,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g – Premium Herbal Kola Nuts",price:2000,img:"images/bitterkola-125g.jpg"},

// ALMONDS 1KG
{name:"Raw Almonds 1kg – Premium Healthy Nuts",price:2200,img:"images/almond-1kg.jpg"},
{name:"Roasted Almonds 1kg – Crunchy Snack Pack",price:2400,img:"images/almond-1kg.jpg"},

// ALMONDS 500G
{name:"Raw Almonds 500g – Fresh Natural Nuts",price:1200,img:"images/almond-500g.jpg"},
{name:"Roasted Almonds 500g – Crunchy & Tasty",price:1400,img:"images/almond-500g.jpg"},

// ALMONDS 250G
{name:"Raw Almonds 250g – Healthy Snack Pack",price:700,img:"images/almond-250g.jpg"},
{name:"Roasted Almonds 250g – Ready-to-Eat Crunchy Nuts",price:900,img:"images/almond-250g.jpg"},

// CASHEWS 1KG
{name:"Raw Cashew Nuts 1kg – Premium Fresh Quality",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Roasted Cashew Nuts 1kg – Crunchy Snack Pack",price:2000,img:"images/cashew-1kg.jpg"},

// CASHEWS 500G
{name:"Raw Cashew Nuts 500g – Fresh Natural Snack",price:1000,img:"images/cashew-500g.jpg"},
{name:"Roasted Cashew Nuts 500g – Crunchy & Tasty",price:1200,img:"images/cashew-500g.jpg"},

// CASHEWS 250G
{name:"Raw Cashew Nuts 250g – Healthy Snack Pack",price:600,img:"images/cashew-250g.jpg"},
{name:"Roasted Cashew Nuts 250g – Ready-to-Eat Snack",price:800,img:"images/cashew-250g.jpg"},

// BRAZIL NUTS
{name:"Brazil Nuts 500g – Premium Selenium-Rich Nuts",price:5500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g – Healthy Superfood Snack",price:3500,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g – Small Healthy Snack Pack",price:1800,img:"images/brazil-125g.jpg"}

];

let cart=[];

/* RENDER */
function render(){
let box=document.getElementById("products-list");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let val=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";
});
});

/* SLIDER */
let i=0;
function buildSlider(){
let slider=document.getElementById("slider");

products.forEach((p,index)=>{
slider.innerHTML+=`
<div class="slide ${index===0?"active":""}" style="background-image:url('${p.img}')">
<h1>${p.name}</h1>
</div>`;
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
}

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
box.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price;
box.innerHTML+=`
<div style="display:flex;justify-content:space-between;margin:6px 0;">
<span>${i.name}</span>
<button onclick="removeItem(${index})">X</button>
</div>`;
});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* CHECKOUT */
function checkout(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

if(!name||!phone||!location||cart.length===0){
alert("Fill all fields");
return;
}

let total=0;
let summary="";

cart.forEach((i,index)=>{
summary+=`${index+1}. ${i.name} - KSh ${i.price}<br>`;
total+=i.price;
});

document.getElementById("confirmation").style.display="block";
document.getElementById("order-summary").innerHTML=summary + "<br><b>Total: KSh "+total+"</b>";

window.open("https://wa.me/254726718968");

cart=[];
updateCart();
}

function closeConfirmation(){
document.getElementById("confirmation").style.display="none";
}
function getLocation(){
if(!navigator.geolocation){
alert("Geolocation not supported");
return;
}

navigator.geolocation.getCurrentPosition(
async (position)=>{
let lat=position.coords.latitude;
let lon=position.coords.longitude;

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let data=await res.json();

let address = data.display_name || `${lat}, ${lon}`;
document.getElementById("location").value = address;

}catch{
document.getElementById("location").value = `${lat}, ${lon}`;
}
},
()=>{
alert("Please allow location access");
}
);
}
/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
render();
buildSlider();
});
</script>

</body>
</html>
