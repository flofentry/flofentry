<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flofentry Foods</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f0f0f;color:#fff;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:#000;
position:sticky;top:0;
}

.container{max-width:1200px;margin:auto;padding:40px 20px;}

/* SLIDER */
.slider{height:300px;position:relative;overflow:hidden;}
.slide{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
opacity:0;transition:1s;
}
.slide.active{opacity:1;}
.slide img{max-width:200px;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}
.card:hover{transform:translateY(-6px);}
.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.btn{
background:#25D366;
border:none;
padding:10px;
width:100%;
color:#fff;
margin-top:10px;
cursor:pointer;
}

/* CART FLOAT */
#cart-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.modal-content{
background:#1a1a1a;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}
</style>
</head>

<body>

<header>
<h2>Flofentry</h2>
<button onclick="openAdmin()">Admin</button>
</header>

<!-- SLIDER -->
<div class="container">
<div id="slider" class="slider"></div>
</div>

<!-- PRODUCTS -->
<section class="container">
<h2>Our Products</h2>
<div id="products-list" class="products"></div>
</section>

<!-- CART FLOAT -->
<div id="cart-float" onclick="openCheckout()">🛒 <span id="cart-count">0</span></div>

<!-- CHECKOUT -->
<div id="checkout-modal" class="modal">
<div class="modal-content">

<h2>Checkout</h2>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="location" placeholder="Location"><br>

<button class="btn" onclick="getLocation()">Auto Location</button>

<div id="cart-items"></div>

<h3>Total: KSh <span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Order</button>
<button onclick="closeCheckout()">Close</button>

</div>
</div>

<!-- PRODUCT MODAL -->
<div id="product-modal" class="modal">
<div class="modal-content" id="product-details"></div>
</div>

<script>

/* PRODUCTS */
let products=[
{name:"Bitter Kola 60g",price:600,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g",price:1200,img:"images/bitterkola-125g.jpg"},
{name:"Almond 1kg",price:2000,img:"images/almond-1kg.jpg"},
{name:"Almond 500g",price:1200,img:"images/almond-500g.jpg"},
{name:"Almond 250g",price:700,img:"images/almond-250g.jpg"},
{name:"Cashew 1kg",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Cashew 500g",price:1000,img:"images/cashew-500g.jpg"},
{name:"Cashew 250g",price:600,img:"images/cashew-250g.jpg"},
{name:"Brazil Nuts 500g",price:3500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g",price:2000,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g",price:1200,img:"images/brazil-125g.jpg"}
];

let cart=[];

/* RENDER PRODUCTS */
function render(){
const box=document.getElementById("products-list");

if(!box){
console.error("products-list missing");
return;
}

box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openProduct('${p.name}')">
<img src="${p.img}" onerror="this.src='images/logo.jpg'">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
</div>`;
});
}

/* SLIDER */
let i=0;
function buildSlider(){
const slider=document.getElementById("slider");

products.forEach((p,index)=>{
slider.innerHTML+=`
<div class="slide ${index===0?'active':''}">
<img src="${p.img}">
<h3>${p.name}</h3>
</div>`;
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
}

/* PRODUCT POPUP */
function openProduct(name){
let p=products.find(x=>x.name===name);

document.getElementById("product-details").innerHTML=`
<img src="${p.img}" style="width:100%">
<h2>${p.name}</h2>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add to Cart</button>
<button onclick="closeProduct()">Close</button>
`;

document.getElementById("product-modal").style.display="flex";
}

function closeProduct(){
document.getElementById("product-modal").style.display="none";
}

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}

function updateCart(){
let total=0;
let box=document.getElementById("cart-items");
box.innerHTML="";

cart.forEach(i=>{
total+=i.price;
box.innerHTML+=i.name+"<br>";
});

document.getElementById("total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

/* CHECKOUT */
function openCheckout(){
document.getElementById("checkout-modal").style.display="flex";
}
function closeCheckout(){
document.getElementById("checkout-modal").style.display="none";
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("location").value=
pos.coords.latitude+","+pos.coords.longitude;
});
}

/* ORDER */
function checkout(){
alert("Order placed via WhatsApp");
}

/* ADMIN */
function openAdmin(){
let pass=prompt("Enter password");
if(pass!=="Newtonohms@1") return;
alert("Admin panel coming next");
}

/* INIT */
document.addEventListener("DOMContentLoaded",function(){
render();
buildSlider();
});

</script>

</body>
</html>
