<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flofentry Foods | Premium Nuts Kenya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f0f0f;color:#fff;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 30px;background:#000;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:45px;}

nav a{color:#fff;margin-left:20px;text-decoration:none;}

.slider{
position:relative;height:380px;overflow:hidden;margin:20px;
border-radius:12px;background:#111;
}

/* NEW SLIDE DESIGN */
.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
text-align:center;
padding:20px;
}

.slide.active{opacity:1;}

.slide img{
max-width:220px;
height:auto;
border-radius:12px;
margin-bottom:15px;
transition:0.4s;
}

.slide img:hover{
transform:scale(1.05);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card{
background:#1a1a1a;padding:15px;border-radius:10px;text-align:center;
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;height:160px;object-fit:cover;border-radius:10px;
}

.btn{
background:#25D366;border:none;padding:10px;color:#fff;
width:100%;margin-top:10px;cursor:pointer;border-radius:5px;
}

#cart{
max-width:500px;margin:20px auto;background:#111;padding:20px;border-radius:10px;
}

input{width:100%;padding:10px;margin:5px 0;}

footer{
background:#000;padding:30px;text-align:center;margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="images/logo.jpg">
<h2>Flofentry</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>

<div>Cart: <span id="cart-count">0</span></div>
</header>

<!-- SLIDER -->
<div class="slider" id="slider"></div>

<!-- PRODUCTS -->
<section id="products">
<h2 style="padding:20px;">Our Products</h2>
<div class="products" id="products-list"></div>
</section>

<!-- CART -->
<div id="cart">
<h3>Customer Details</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<h3>Cart</h3>
<div id="cart-items"></div>

<h3>Total: KSh <span id="total">0</span></h3>
<button class="btn" onclick="checkout()">Order via WhatsApp</button>
</div>

<!-- CONTACT -->
<section id="contact" style="text-align:center;">
<h2>Contact</h2>
<p>+254726718968</p>
<p>flofrenry@gmail.com</p>
</section>

<footer>
<p>© 2026 Flofentry Foods</p>
</footer>

<script>

/* PRODUCTS (ALL INCLUDED) */
let products=[
{name:"Bitter Kola 60g",price:600,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g",price:1200,img:"images/bitterkola-125g.jpg"},

{name:"Almond 1kg",price:2000,img:"images/almond-1kg.jpg"},
{name:"Almond 500g",price:1200,img:"images/almond-500g.jpg"},
{name:"Almond 250g",price:700,img:"images/almond-250g.jpg"},

{name:"Cashew 1kg",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Cashew 500g",price:1000,img:"images/cashew-500g.jpg"},
{name:"Cashew 250g",price:600,img:"images/cashew-250g.jpg"},

{name:"Brazil Nuts 500g",price:3500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g",price:2000,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g",price:1200,img:"images/brazil-125g.jpg"}
];

let cart=[];

/* RENDER PRODUCTS */
function render(){
const box=document.getElementById("products-list");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}" onerror="this.src='images/logo.jpg'">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add</button>
</div>
`;
});
}

/* SLIDER (FIXED SMALL IMAGES) */
function createSlider(){
const slider=document.getElementById("slider");
slider.innerHTML="";

products.forEach((p,i)=>{
slider.innerHTML+=`
<div class="slide ${i===0?"active":""}">
<img src="${p.img}" onerror="this.src='images/logo.jpg'">
<h2>${p.name}</h2>
<p>KSh ${p.price}</p>
</div>
`;
});
}

let index=0;
setInterval(()=>{
let slides=document.querySelectorAll(".slide");
if(slides.length===0) return;

slides.forEach(s=>s.classList.remove("active"));
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
box.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price;
box.innerHTML+=`${item.name} - ${item.price} 
<button onclick="removeItem(${index})">X</button><br>`;
});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* CHECKOUT */
function checkout(){
let n=document.getElementById("name").value;
let p=document.getElementById("phone").value;
let l=document.getElementById("location").value;

if(!n||!p||!l||cart.length===0){
alert("Fill all fields");
return;
}

let total=0;
let msg=`Hello Flofentry Foods,%0AName:${n}%0APhone:${p}%0ALocation:${l}%0A`;

cart.forEach(i=>{
msg+=`${i.name} - ${i.price}%0A`;
total+=i.price;
});

msg+=`Total: ${total}`;

window.open("https://wa.me/254726718968?text="+msg);

cart=[];
updateCart();
}

/* INIT */
render();
createSlider();

</script>

</body>
</html>
