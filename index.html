<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flofentry Foods | Premium Nuts Kenya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0f1a14;color:#fff}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#000;flex-wrap:wrap}
.logo{display:flex;gap:10px;align-items:center}
.logo img{height:35px}
.menu-toggle{display:none;font-size:24px;cursor:pointer}

nav{display:flex;gap:10px}
nav a{color:#fff;text-decoration:none;font-size:14px}

@media(max-width:768px){
.menu-toggle{display:block}
nav{display:none;flex-direction:column;width:100%;background:#000}
nav.active{display:flex}
}

/* HERO */
.slider{height:250px;position:relative;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s;
display:flex;justify-content:center;align-items:center;background-size:contain;background-repeat:no-repeat;background-position:center}
.slide.active{opacity:1}

/* GRID */
.products,.trust{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px}

.card{background:#16241c;padding:10px;border-radius:10px}
.card img{width:100%;height:120px;object-fit:contain}

.btn{background:#2e7d32;color:#fff;border:none;padding:10px;width:100%;margin-top:5px}

input{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:none}

/* FLOAT WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;background:#25D366;
padding:15px;border-radius:50%;color:#fff;text-decoration:none;font-size:20px}

/* STARS */
.stars span{cursor:pointer;color:#555;font-size:18px}
.stars span:hover{color:gold}

/* PANELS */
#admin,#tracking{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1a14;padding:20px;overflow:auto}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="images/logo.jpg">
<h3>Flofentry</h3>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="menu">
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#" onclick="openAdmin()">Admin</a>
</nav>

<div>Cart: <span id="count">0</span></div>
</header>

<!-- HERO -->
<div class="slider" id="slider"></div>

<!-- DELIVERY -->
<p style="text-align:center;color:#ccc;padding:10px">
🚚 We deliver across Kenya at a small fee depending on your location.
</p>

<!-- SEARCH -->
<input id="search" placeholder="Search products..." onkeyup="searchProducts()">

<!-- CATEGORIES -->
<div style="text-align:center">
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Almonds')">Almonds</button>
<button onclick="filterCategory('Cashews')">Cashews</button>
<button onclick="filterCategory('Bitter Kola')">Bitter Kola</button>
<button onclick="filterCategory('Brazil Nuts')">Brazil Nuts</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

<!-- CART -->
<div style="padding:10px">
<h3>Checkout</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<button class="btn" onclick="getLocation()">Use My Location 📍</button>

<div id="cart"></div>
<h3>Total: KSh <span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Order via WhatsApp</button>
</div>

<!-- ORDER HISTORY -->
<div style="padding:10px">
<h3>Your Orders</h3>
<input id="history-phone" placeholder="Phone">
<button onclick="loadHistory()">Check</button>
<div id="history"></div>
</div>

<!-- ADMIN -->
<div id="admin">
<h2>Admin</h2>
<button onclick="admin.style.display='none'">Close</button>
<div id="analytics"></div>
<canvas id="chart"></canvas>
<div id="orders"></div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/254726718968" class="whatsapp">💬</a>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"YOUR_PROJECT"
});
const db=firebase.firestore();

/* PRODUCTS */
let products=[

{name:"Bitter Kola 60g – Natural Herbal Wellness",price:1000,img:"images/bitterkola-60g.jpg",category:"Bitter Kola"},
{name:"Bitter Kola 125g – Premium Herbal Kola Nuts",price:2000,img:"images/bitterkola-125g.jpg",category:"Bitter Kola"},

{name:"Raw Almonds 1kg – Premium Healthy Nuts",price:2200,img:"images/almond-1kg.jpg",category:"Almonds"},
{name:"Roasted Almonds 1kg – Crunchy Snack Pack",price:2400,img:"images/almond-1kg.jpg",category:"Almonds"},

{name:"Raw Almonds 500g – Fresh Natural Nuts",price:1200,img:"images/almond-500g.jpg",category:"Almonds"},
{name:"Roasted Almonds 500g – Crunchy & Tasty",price:1400,img:"images/almond-500g.jpg",category:"Almonds"},

{name:"Raw Almonds 250g – Healthy Snack Pack",price:700,img:"images/almond-250g.jpg",category:"Almonds"},
{name:"Roasted Almonds 250g – Ready-to-Eat Crunchy Nuts",price:900,img:"images/almond-250g.jpg",category:"Almonds"},

{name:"Raw Cashew Nuts 1kg – Premium Fresh Quality",price:1800,img:"images/cashew-1kg.jpg",category:"Cashews"},
{name:"Roasted Cashew Nuts 1kg – Crunchy Snack Pack",price:2000,img:"images/cashew-1kg.jpg",category:"Cashews"},

{name:"Raw Cashew Nuts 500g – Fresh Natural Snack",price:1000,img:"images/cashew-500g.jpg",category:"Cashews"},
{name:"Roasted Cashew Nuts 500g – Crunchy & Tasty",price:1200,img:"images/cashew-500g.jpg",category:"Cashews"},

{name:"Raw Cashew Nuts 250g – Healthy Snack Pack",price:600,img:"images/cashew-250g.jpg",category:"Cashews"},
{name:"Roasted Cashew Nuts 250g – Ready-to-Eat Snack",price:800,img:"images/cashew-250g.jpg",category:"Cashews"},

{name:"Brazil Nuts 500g – Premium Selenium-Rich Nuts",price:5500,img:"images/brazil-500g.jpg",category:"Brazil Nuts"},
{name:"Brazil Nuts 250g – Healthy Superfood Snack",price:3500,img:"images/brazil-250g.jpg",category:"Brazil Nuts"},
{name:"Brazil Nuts 125g – Small Healthy Snack Pack",price:1800,img:"images/brazil-125g.jpg",category:"Brazil Nuts"}

];

let cart=[];

/* RENDER */
function render(list=products){
let box=document.getElementById("products");
box.innerHTML="";

list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>KSh ${p.price}</p>

<div class="stars">
<span onclick="rate('${p.name}',1)">★</span>
<span onclick="rate('${p.name}',2)">★</span>
<span onclick="rate('${p.name}',3)">★</span>
<span onclick="rate('${p.name}',4)">★</span>
<span onclick="rate('${p.name}',5)">★</span>
</div>

<div id="avg-${p.name}"></div>

<button class="btn" onclick="add('${p.name}')">Add</button>
</div>
`;
setTimeout(()=>loadRating(p.name),300);
});
}

/* SEARCH */
function searchProducts(){
let v=search.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* FILTER */
function filterCategory(c){
render(c==="All"?products:products.filter(p=>p.category===c));
}

/* CART */
function add(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}

function updateCart(){
let box=document.getElementById("cart");
box.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price;
box.innerHTML+=`<div>${i.name} <button onclick="remove(${index})">X</button></div>`;
});

count.innerText=cart.length;
document.getElementById("total").innerText=total;
}

function remove(i){cart.splice(i,1);updateCart();}

/* LOCATION */
async function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let data=await res.json();
location.value=(data.address.city||data.address.county||"Location")+", Kenya";
});
}

/* CHECKOUT */
function checkout(){
let msg="Order:%0A";
let total=0;

cart.forEach(i=>{
msg+=`${i.name} KSh${i.price}%0A`;
total+=i.price;
});

window.open(`https://wa.me/254726718968?text=${msg}`);
}

/* RATINGS */
function rate(p,v){
db.collection("ratings").add({product:p,value:v});
}

function loadRating(p){
db.collection("ratings").where("product","==",p)
.onSnapshot(snap=>{
let t=0,c=0;
snap.forEach(d=>{t+=d.data().value;c++});
document.getElementById(`avg-${p}`).innerText=`⭐ ${(t/c||0).toFixed(1)} (${c})`;
});
}

/* ADMIN */
function openAdmin(){
if(prompt("Password")!=="Newtonohms@1")return;
admin.style.display="block";

db.collection("orders").onSnapshot(snap=>{
orders.innerHTML="";
let total=0;

snap.forEach(doc=>{
let d=doc.data();
total+=d.total;

orders.innerHTML+=`
<div>
${d.customer.name} - ${d.total}
<select onchange="updateStatus('${doc.id}',this.value)">
<option>Pending</option>
<option>On the way</option>
<option>Delivered</option>
</select>
</div>`;
});

analytics.innerHTML="Total Revenue: "+total;
});
}

function updateStatus(id,s){
db.collection("orders").doc(id).update({status:s});
}

/* INIT */
render();

</script>

</body>
</html>
