<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"YOUR_PROJECT_ID"
});
const db=firebase.firestore();

/* PRODUCTS */
let products=[

// BITTER KOLA
{name:"Bitter Kola 60g – Natural Herbal Wellness",price:1000,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g – Premium Herbal Kola Nuts",price:2000,img:"images/bitterkola-125g.jpg"},

// ALMONDS
{name:"Raw Almonds 1kg – Premium Healthy Nuts",price:2200,img:"images/almond-1kg.jpg"},
{name:"Roasted Almonds 1kg – Crunchy Snack Pack",price:2400,img:"images/almond-1kg.jpg"},

{name:"Raw Almonds 500g – Fresh Natural Nuts",price:1200,img:"images/almond-500g.jpg"},
{name:"Roasted Almonds 500g – Crunchy & Tasty",price:1400,img:"images/almond-500g.jpg"},

{name:"Raw Almonds 250g – Healthy Snack Pack",price:700,img:"images/almond-250g.jpg"},
{name:"Roasted Almonds 250g – Ready-to-Eat Crunchy Nuts",price:900,img:"images/almond-250g.jpg"},

// CASHEWS
{name:"Raw Cashew Nuts 1kg – Premium Fresh Quality",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Roasted Cashew Nuts 1kg – Crunchy Snack Pack",price:2000,img:"images/cashew-1kg.jpg"},

{name:"Raw Cashew Nuts 500g – Fresh Natural Snack",price:1000,img:"images/cashew-500g.jpg"},
{name:"Roasted Cashew Nuts 500g – Crunchy & Tasty",price:1200,img:"images/cashew-500g.jpg"},

{name:"Raw Cashew Nuts 250g – Healthy Snack Pack",price:600,img:"images/cashew-250g.jpg"},
{name:"Roasted Cashew Nuts 250g – Ready-to-Eat Snack",price:800,img:"images/cashew-250g.jpg"},

// BRAZIL
{name:"Brazil Nuts 500g – Premium Selenium-Rich Nuts",price:5500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g – Healthy Superfood Snack",price:3500,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g – Small Healthy Snack Pack",price:1800,img:"images/brazil-125g.jpg"}

];

let cart=[];

/* RENDER */
function render(){
let box=document.getElementById("products-list");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

/* SLIDER */
let i=0;
function buildSlider(){
let slider=document.getElementById("slider");
slider.innerHTML="";

products.forEach((p,index)=>{
slider.innerHTML+=`
<div class="slide ${index===0?"active":""}" style="background-image:url('${p.img}')">
<h1>${p.name}</h1>
<p>KSh ${p.price}</p>
</div>`;
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
}

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
box.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price;

box.innerHTML+=`
<div style="display:flex;justify-content:space-between;">
<span>${item.name}</span>
<button onclick="removeItem(${index})">X</button>
</div>`;
});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* LOCATION → REAL WORDS */
function getLocation(){

navigator.geolocation.getCurrentPosition(async pos=>{

try{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let data=await res.json();

let place =
data.address.suburb ||
data.address.city ||
data.address.town ||
data.address.county ||
"Kenya";

document.getElementById("location").value = place;

}catch{
document.getElementById("location").value="Kenya";
}

});

}

/* CHECKOUT */
function checkout(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

if(!name||!phone||!location||cart.length===0){
alert("Fill all fields");
return;
}

let total=0;

let msg=`Hello Flofentry Foods,%0AName:${name}%0APhone:${phone}%0ALocation:${location}%0A`;

cart.forEach((item,index)=>{
msg+=`${index+1}. ${item.name} - KSh ${item.price}%0A`;
total+=item.price;
});

msg+=`Total: KSh ${total}`;

db.collection("orders").add({
customer:{name,phone,location},
items:cart,
total,
status:"Pending"
});

window.open("https://wa.me/254726718968?text="+msg);

cart=[];
updateCart();
}

/* TRACKING */
function openTracking(){document.getElementById("tracking").style.display="block";}
function closeTracking(){document.getElementById("tracking").style.display="none";}

function trackOrders(){

let phone=document.getElementById("track-phone").value;

db.collection("orders")
.where("customer.phone","==",phone)
.onSnapshot(snap=>{

let box=document.getElementById("track-results");
box.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

box.innerHTML+=`
<div class="order">${d.status} - KSh ${d.total}</div>`;
});

});

}

/* ADMIN */
function openAdmin(){
if(prompt("Password")!=="Newtonohms@1")return;

document.getElementById("admin").style.display="block";
loadOrders();
loadAnalytics();
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

function loadOrders(){

db.collection("orders").onSnapshot(snap=>{
let box=document.getElementById("orders");
box.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

box.innerHTML+=`
<div class="order">${d.customer.name} - KSh ${d.total}</div>`;
});

});

}

function loadAnalytics(){

db.collection("orders").onSnapshot(snap=>{

let revenue=0;

snap.forEach(doc=>{
revenue+=doc.data().total;
});

document.getElementById("analytics").innerHTML =
`Total Revenue: KSh ${revenue}`;

});

}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
render();
buildSlider();
});

</script>
