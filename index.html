<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flofentry Foods | Premium Nuts Kenya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#0f0f0f;color:#fff;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:15px;background:#000;
}

nav a{color:#fff;margin-left:15px;text-decoration:none;}

.hero{text-align:center;padding:60px;background:#111;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card{
background:#1a1a1a;padding:15px;border-radius:10px;text-align:center;
}

.btn{
background:#25D366;border:none;padding:10px;color:#fff;
width:100%;margin-top:10px;cursor:pointer;
}

#cart-box{
max-width:400px;margin:20px auto;background:#111;
padding:15px;border-radius:10px;
}

input{
width:100%;padding:8px;margin:5px 0;
}

/* PANELS */
#admin,#tracking{
display:none;
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;padding:20px;overflow:auto;z-index:9999;
}

.order{
background:#111;padding:10px;margin:10px 0;border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>Flofentry Foods</h2>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#" onclick="openTracking()">Track Order</a>
<a href="#" onclick="openAdmin()">Admin</a>
</nav>

<div>🛒 <span id="cart-count">0</span></div>
</header>

<section class="hero">
<h1>Premium Nuts & Superfoods</h1>
</section>

<!-- PRODUCTS -->
<section id="products" class="products"></section>

<!-- CUSTOMER FORM + CART -->
<div id="cart-box">

<h3>Customer Details</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Delivery Location">

<button class="btn" onclick="getLocation()">📍 Auto Detect Location</button>

<h3>Your Cart</h3>
<div id="cart-items"></div>

<h3>Total: KSh <span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Order via WhatsApp</button>
</div>

<!-- TRACKING PANEL -->
<div id="tracking">
<h2>Track Your Order</h2>
<button onclick="closeTracking()">Close</button>

<input id="track-phone" placeholder="Enter Phone Number">
<button class="btn" onclick="trackOrders()">Track</button>

<div id="track-results"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
<h2>Admin Dashboard</h2>
<button onclick="closeAdmin()">Close</button>

<h3>📊 Daily Analytics</h3>
<div id="analytics"></div>

<h3>Orders</h3>
<div id="orders"></div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* PRODUCTS */
let products=[
{name:"Bitter Kola 60g",price:600},
{name:"Bitter Kola 125g",price:1200},
{name:"Almond 1kg",price:2000},
{name:"Almond 500g",price:1200},
{name:"Almond 250g",price:700},
{name:"Cashew 1kg",price:1800},
{name:"Cashew 500g",price:1000},
{name:"Cashew 250g",price:600},
{name:"Brazil Nuts 500g",price:3500},
{name:"Brazil Nuts 250g",price:2000}
];

let cart=[];

/* RENDER PRODUCTS */
function render(){
let box=document.getElementById("products");
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

/* CART */
function addToCart(name){
let p=products.find(x=>x.name===name);
cart.push(p);
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
box.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price;
box.innerHTML+=`
${i.name} - ${i.price}
<button onclick="removeItem(${index})">X</button><br>`;
});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("location").value =
pos.coords.latitude+","+pos.coords.longitude;
});
}

/* CHECKOUT */
function checkout(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

if(!name||!phone||!location||cart.length===0){
alert("Fill all fields");
return;
}

let total=0;
let msg=`Hello Flofentry Foods,%0AName:${name}%0APhone:${phone}%0ALocation:${location}%0A%0A`;

cart.forEach((i,index)=>{
msg+=`${index+1}. ${i.name} - KSh ${i.price}%0A`;
total+=i.price;
});

msg+=`Total: KSh ${total}`;

/* SAVE ORDER */
db.collection("orders").add({
customer:{name,phone,location},
items:cart,
total,
status:"Pending",
date:new Date().toISOString()
});

window.open("https://wa.me/254726718968?text="+msg);

cart=[];
updateCart();
}

/* TRACKING */
function openTracking(){
document.getElementById("tracking").style.display="block";
}
function closeTracking(){
document.getElementById("tracking").style.display="none";
}

function trackOrders(){
let phone=document.getElementById("track-phone").value;

db.collection("orders")
.where("customer.phone","==",phone)
.onSnapshot(snap=>{
let box=document.getElementById("track-results");
box.innerHTML="";

if(snap.empty){
box.innerHTML="No orders found";
return;
}

snap.forEach(doc=>{
let d=doc.data();

box.innerHTML+=`
<div class="order">
Status: ${d.status}<br>
Total: KSh ${d.total}<br>
${d.items.map(i=>i.name).join("<br>")}
</div>`;
});
});
}

/* ADMIN */
function openAdmin(){
let pass=prompt("Password");
if(pass!=="Newtonohms@1")return;

document.getElementById("admin").style.display="block";
loadOrders();
loadAnalytics();
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

/* LOAD ORDERS */
function loadOrders(){
db.collection("orders").onSnapshot(snap=>{
let box=document.getElementById("orders");
box.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

box.innerHTML+=`
<div class="order">
<b>${d.customer.name}</b><br>
${d.customer.phone}<br>
${d.customer.location}<br><br>

${d.items.map(i=>i.name).join("<br>")}

<br>Total: ${d.total}
<br>Status: ${d.status}

<select onchange="updateStatus('${doc.id}',this.value)">
<option ${d.status=="Pending"?"selected":""}>Pending</option>
<option ${d.status=="Paid"?"selected":""}>Paid</option>
<option ${d.status=="Delivered"?"selected":""}>Delivered</option>
</select>

</div>`;
});
});
}

function updateStatus(id,status){
db.collection("orders").doc(id).update({status});
}

/* ANALYTICS */
function loadAnalytics(){
db.collection("orders").onSnapshot(snap=>{
let today=new Date().toISOString().slice(0,10);
let orders=0,revenue=0;

snap.forEach(doc=>{
let d=doc.data();
if(d.date.startsWith(today)){
orders++;
revenue+=d.total;
}
});

document.getElementById("analytics").innerHTML=
`Orders Today: ${orders}<br>Revenue: KSh ${revenue}`;
});
}

render();

</script>

</body>
</html>
