<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flofentry Foods | Premium Nuts Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- FIREBASE (ONLY DATABASE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#f7f7f7;}

/* ===== TOP BAR ===== */
.topbar{
  background:#0f4c81;
  color:#fff;
  display:flex;
  justify-content:space-between;
  padding:6px 20px;
  font-size:14px;
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#fff;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.search{
  width:40%;
  display:flex;
}

.search input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
}

.search button{
  padding:10px;
  background:#0f4c81;
  color:#fff;
  border:none;
}

.cart{
  background:#eee;
  padding:10px;
  border-radius:6px;
}

/* ===== NAVBAR ===== */
.navbar{
  background:#0f4c81;
  padding:12px;
}
.navbar a{
  color:#fff;
  margin:10px;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:60px;
  background:#fff;
}

/* ===== PRODUCTS ===== */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.btn{
  width:100%;
  padding:10px;
  background:#25D366;
  color:#fff;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

/* ===== CART BOX ===== */
#cartBox{
  padding:20px;
}

/* ===== FOOTER ===== */
footer{
  background:#0f4c81;
  color:#fff;
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

/* ===== ADMIN ===== */
#admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  color:#fff;
  overflow:auto;
  padding:20px;
  z-index:9999;
}

.order{
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div>🚚 Free delivery over KSh 3000</div>
<div onclick="openAdmin()">Admin</div>
</div>

<!-- HEADER -->
<header>
<div class="logo">
<img src="images/logo.jpg" height="40">
<b>FLOFENTRY FOODS</b>
</div>

<div class="search">
<input placeholder="Search products...">
<button>🔍</button>
</div>

<div class="cart">🛒 <span id="count">0</span></div>
</header>

<!-- NAV -->
<div class="navbar">
<a href="#">Home</a>
<a href="#products">Shop</a>
<a href="#">Offers</a>
<a href="#">Contact</a>
</div>

<!-- HERO -->
<div class="hero">
<h1>Premium Nuts & Superfoods</h1>
<p>Healthy • Natural • Fresh</p>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div id="cartBox">
<h3>Cart</h3>
<div id="cartItems"></div>
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<!-- FOOTER -->
<footer>
<div class="grid">

<div>
<h3>Quick Links</h3>
<p>About</p>
<p>Delivery</p>
</div>

<div>
<h3>Contact</h3>
<p>WhatsApp: 0716 250 250</p>
<p>Email: flofentry@gmail.com</p>
</div>

<div>
<h3>Newsletter</h3>
<input placeholder="Email">
</div>

</div>
</footer>

<!-- ADMIN -->
<div id="admin">
<h2>Admin Dashboard</h2>
<button onclick="closeAdmin()">Close</button>
<div id="orders"></div>
</div>

<script>

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== PRODUCTS ===== */
let products = [
{name:"Cashew 500g",price:1000,image:"images/cashew.jpg"},
{name:"Almond 500g",price:1200,image:"images/almond.jpg"},
{name:"Bitter Kola 125g",price:1100,image:"images/kola.jpg"}
];

let cart=[];

/* ===== RENDER PRODUCTS ===== */
function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

/* ===== ADD TO CART ===== */
function addToCart(name){
let p=products.find(x=>x.name===name);
cart.push(p);
updateCart();
}

/* ===== UPDATE CART ===== */
function updateCart(){
document.getElementById("count").innerText=cart.length;

let box=document.getElementById("cartItems");
box.innerHTML="";

let grouped={};
cart.forEach(c=>{
grouped[c.name]=(grouped[c.name]||0)+1;
});

for(let i in grouped){
let p=products.find(x=>x.name===i);
box.innerHTML+=<div>${i} x${grouped[i]} - KSh ${p.price*grouped[i]}</div>;
}
}

/* ===== CHECKOUT ===== */
function checkout(){

if(cart.length===0){
alert("Cart is empty");
return;
}

db.collection("orders").add({
items:cart,
date:new Date().toLocaleString(),
status:"New"
});

alert("Order placed successfully!");
cart=[];
updateCart();
}

/* ===== ADMIN ACCESS ===== */
function openAdmin(){

let pass=prompt("Enter Admin Password");

if(pass!=="Newtonohms@1"){
alert("Access denied");
return;
}

document.getElementById("admin").style.display="block";
loadOrders();
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

/* ===== LOAD ORDERS ===== */
function loadOrders(){

db.collection("orders").onSnapshot(snap=>{
let box=document.getElementById("orders");
box.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

box.innerHTML+=`
<div class="order">
${d.items.map(i=>i.name).join("<br>")}
<br><small>${d.date}</small>
</div>`;
});
});

}

/* INIT */
render();

</script>

</body>
</html>
