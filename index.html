<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flofentry Foods | Premium Nuts Kenya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f0f0f;color:#fff;line-height:1.6;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;background:#000;position:sticky;top:0;z-index:1000;
}

.container{max-width:1200px;margin:auto;padding:40px 20px;}

/* HERO SLIDER */
.slider{height:320px;overflow:hidden;border-radius:12px;position:relative;}
.slide{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
opacity:0;transition:1s;
}
.slide.active{opacity:1;}
.slide img{max-width:220px;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:#1a1a1a;padding:15px;border-radius:12px;
cursor:pointer;transition:.3s;
}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;}

.btn{
background:#25D366;color:#fff;border:none;
padding:12px;border-radius:6px;width:100%;margin-top:10px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;align-items:center;z-index:9999;
}
.modal-content{
background:#1a1a1a;padding:25px;border-radius:10px;width:90%;max-width:400px;
}

/* CART FLOAT */
#cart-float{
position:fixed;bottom:20px;right:20px;
background:#25D366;padding:15px 20px;border-radius:50px;cursor:pointer;
}

/* REVIEWS */
.review{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;}
.badge{background:#25D366;padding:3px 8px;font-size:12px;border-radius:5px;}

</style>
</head>

<body>

<header>
<h2>Flofentry</h2>
<div>
<button onclick="openAdmin()">Admin</button>
</div>
</header>

<!-- HERO -->
<div class="container">
<div class="slider" id="slider"></div>
</div>

<!-- PRODUCTS -->
<section class="container">
<h2>Our Products</h2>
<div id="products-list" class="products"></div>
</section>

<!-- REVIEWS -->
<section class="container">
<h2>Customer Reviews</h2>

<select id="filter-product" onchange="filterReviews()"></select>

<input id="fb-name" placeholder="Name">
<input id="fb-phone" placeholder="Phone">
<select id="fb-product"></select>

<textarea id="fb-message" placeholder="Write review"></textarea>
<input type="file" id="fb-image">

<button class="btn" onclick="submitFeedback()">Submit Review</button>

<div id="feedback-list"></div>
</section>

<!-- CART FLOAT -->
<div id="cart-float" onclick="openCheckout()">🛒 <span id="cart-count">0</span></div>

<!-- CHECKOUT -->
<div id="checkout-modal" class="modal">
<div class="modal-content">
<h2>Checkout</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<button class="btn" onclick="getLocation()">Auto Location</button>

<div id="cart-items"></div>
<h3>Total: KSh <span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Confirm</button>
<button onclick="closeCheckout()">Close</button>
</div>
</div>

<!-- PRODUCT MODAL -->
<div id="product-modal" class="modal">
<div class="modal-content" id="product-details"></div>
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"YOUR_PROJECT_ID"
});
const db=firebase.firestore();

/* PRODUCTS */
let products=[
{name:"Bitter Kola 60g",price:600,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g",price:1200,img:"images/bitterkola-125g.jpg"},
{name:"Almond 1kg",price:2000,img:"images/almond-1kg.jpg"},
{name:"Almond 500g",price:1200,img:"images/almond-500g.jpg"},
{name:"Almond 250g",price:700,img:"images/almond-250g.jpg"},
{name:"Cashew 1kg",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Cashew 500g",price:1000,img:"images/cashew-500g.jpg"},
{name:"Cashew 250g",price:600,img:"images/cashew-250g.jpg"},
{name:"Brazil Nuts 500g",price:3500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g",price:2000,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g",price:1200,img:"images/brazil-125g.jpg"}
];

let cart=[];

/* RENDER */
function render(){
const box=document.getElementById("products-list");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openProduct('${p.name}')">
<img src="${p.img}" onerror="this.src='images/logo.jpg'">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
</div>`;
});
}

/* SLIDER */
let i=0;
function buildSlider(){
const slider=document.getElementById("slider");

products.forEach((p,index)=>{
slider.innerHTML+=`
<div class="slide ${index===0?"active":""}">
<img src="${p.img}">
<h3>${p.name}</h3>
</div>`;
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
}

/* PRODUCT MODAL */
function openProduct(name){
let p=products.find(x=>x.name===name);

document.getElementById("product-details").innerHTML=`
<img src="${p.img}" style="width:100%">
<h2>${p.name}</h2>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add to Cart</button>
<button onclick="closeProduct()">Close</button>
`;

document.getElementById("product-modal").style.display="flex";
}
function closeProduct(){
document.getElementById("product-modal").style.display="none";
}

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}
function updateCart(){
let total=0;
const box=document.getElementById("cart-items");
box.innerHTML="";

cart.forEach(i=>{
total+=i.price;
box.innerHTML+=`${i.name}<br>`;
});

document.getElementById("total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

/* CHECKOUT */
function openCheckout(){checkout-modal.style.display="flex";}
function closeCheckout(){checkout-modal.style.display="none";}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
location.value=pos.coords.latitude+","+pos.coords.longitude;
});
}

function checkout(){
alert("Order sent via WhatsApp");
}

/* ADMIN */
function openAdmin(){
if(prompt("Password")!=="Newtonohms@1")return;
alert("Admin panel coming next upgrade");
}

/* INIT */
window.onload=function(){
render();
buildSlider();
};

</script>

</body>
</html>
