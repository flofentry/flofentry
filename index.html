<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flofentry Foods | Buy Premium Nuts in Kenya</title>

<meta name="description" content="Buy premium almonds, cashews, bitter kola & Brazil nuts in Kenya. Fresh, healthy snacks delivered in Nairobi and across Kenya.">
<meta name="keywords" content="nuts Kenya, almonds Nairobi, cashews Kenya, healthy snacks Kenya, buy nuts online">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root{
--bg:#0f1a14;
--card:#16241c;
--primary:#2e7d32;
--accent:#d4af37;
--text:#f5f5f5;
--muted:#bbbbbb;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:linear-gradient(135deg,#0f1a14,#121f18);
color:var(--text);
}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:sticky;top:0;z-index:1000;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.logo h2{color:var(--accent);}

nav a{
margin-left:20px;
text-decoration:none;
color:#fff;
font-size:14px;
}

nav a:hover{color:var(--accent);}

/* HERO */
.slider{
height:380px;
border-radius:12px;
overflow:hidden;
position:relative;
background:#000;
}

.slide{
position:absolute;width:100%;height:100%;
opacity:0;transition:1s;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background-size:contain;background-repeat:no-repeat;background-position:center;
padding:20px;
}

.slide::before{
content:"";
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.slide.active{opacity:1;}

.slide h1{
position:relative;
z-index:2;
font-size:clamp(18px,3.5vw,32px);
text-align:center;
max-width:90%;
line-height:1.2;
}

.slide p{
z-index:2;
margin-top:10px;
}

/* PRODUCTS */
section{padding:60px 20px;max-width:1200px;margin:auto;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;height:160px;object-fit:contain;
background:#0d1511;border-radius:10px;
}

.card h3{
font-size:15px;
margin:10px 0;
}

.btn{
background:var(--primary);
padding:10px;
border:none;
width:100%;
border-radius:8px;
color:#fff;
cursor:pointer;
}

/* CART */
#cart-box{
max-width:450px;
margin:40px auto;
background:var(--card);
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
background:#000;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="images/logo.jpg">
<h2>Flofentry</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
</nav>

<div>Cart: <span id="cart-count">0</span></div>
</header>

<section>
<div class="slider" id="slider"></div>
</section>

<section id="products">
<h2>Our Products</h2>
<div id="products-list" class="products"></div>
</section>

<div id="cart-box">
<h3>Checkout</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Location">

<div id="cart-items"></div>
<h3>Total: KSh <span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Order via WhatsApp</button>
</div>

<footer>
<p>© Flofentry Foods</p>
</footer>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"YOUR_PROJECT_ID"
});
const db=firebase.firestore();

/* PRODUCTS (PRO TITLES) */
let products=[

// BITTER KOLA
{name:"Bitter Kola 60g – Natural Herbal Wellness",price:1000,img:"images/bitterkola-60g.jpg"},
{name:"Bitter Kola 125g – Premium Herbal Kola Nuts",price:2000,img:"images/bitterkola-125g.jpg"},

// ALMONDS 1KG
{name:"Raw Almonds 1kg – Premium Healthy Nuts",price:2200,img:"images/almond-1kg.jpg"},
{name:"Roasted Almonds 1kg – Crunchy Snack Pack",price:2400,img:"images/almond-1kg.jpg"},

// ALMONDS 500G
{name:"Raw Almonds 500g – Fresh Natural Nuts",price:1200,img:"images/almond-500g.jpg"},
{name:"Roasted Almonds 500g – Crunchy & Tasty",price:1400,img:"images/almond-500g.jpg"},

// ALMONDS 250G
{name:"Raw Almonds 250g – Healthy Snack Pack",price:700,img:"images/almond-250g.jpg"},
{name:"Roasted Almonds 250g – Ready-to-Eat Crunchy Nuts",price:900,img:"images/almond-250g.jpg"},

// CASHEWS 1KG
{name:"Raw Cashew Nuts 1kg – Premium Fresh Quality",price:1800,img:"images/cashew-1kg.jpg"},
{name:"Roasted Cashew Nuts 1kg – Crunchy Snack Pack",price:2000,img:"images/cashew-1kg.jpg"},

// CASHEWS 500G
{name:"Raw Cashew Nuts 500g – Fresh Natural Snack",price:1000,img:"images/cashew-500g.jpg"},
{name:"Roasted Cashew Nuts 500g – Crunchy & Tasty",price:1200,img:"images/cashew-500g.jpg"},

// CASHEWS 250G
{name:"Raw Cashew Nuts 250g – Healthy Snack Pack",price:600,img:"images/cashew-250g.jpg"},
{name:"Roasted Cashew Nuts 250g – Ready-to-Eat Snack",price:800,img:"images/cashew-250g.jpg"},

// BRAZIL NUTS
{name:"Brazil Nuts 500g – Premium Selenium-Rich Nuts",price:5500,img:"images/brazil-500g.jpg"},
{name:"Brazil Nuts 250g – Healthy Superfood Snack",price:3500,img:"images/brazil-250g.jpg"},
{name:"Brazil Nuts 125g – Small Healthy Snack Pack",price:1800,img:"images/brazil-125g.jpg"}

];

let cart=[];

/* RENDER PRODUCTS */
function render(){
let box=document.getElementById("products-list");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>KSh ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

/* SLIDER */
let i=0;
function buildSlider(){
let slider=document.getElementById("slider");

products.forEach((p,index)=>{
slider.innerHTML+=`
<div class="slide ${index===0?"active":""}" style="background-image:url('${p.img}')">
<h1>${p.name}</h1>
<p>KSh ${p.price}</p>
</div>`;
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
}

/* CART */
function addToCart(name){
cart.push(products.find(p=>p.name===name));
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
box.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price;
box.innerHTML+=`${i.name} - ${i.price}<br>`;
});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

/* CHECKOUT */
function checkout(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

if(!name||!phone||!location||cart.length===0){
alert("Fill all fields");
return;
}

let msg=`Hello Flofentry Foods,%0AName:${name}%0APhone:${phone}%0ALocation:${location}%0A`;

cart.forEach((i,index)=>{
msg+=`${index+1}. ${i.name} - KSh ${i.price}%0A`;
});

window.open("https://wa.me/254726718968?text="+msg);

db.collection("orders").add({
name,phone,location,cart,date:new Date()
});

cart=[];
updateCart();
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
render();
buildSlider();
});
</script>

</body>
</html>
